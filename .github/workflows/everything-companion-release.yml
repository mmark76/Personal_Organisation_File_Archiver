name: Build Everything Companion release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "everything-companion/**"
      - ".github/workflows/everything-companion-release.yml"

permissions:
  contents: write

jobs:
  build:
    name: Build Windows companion package
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish self-contained companion
        shell: pwsh
        run: |
          dotnet publish everything-companion/EverythingCompanion.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output companion-package

      - name: Add installer files
        shell: pwsh
        run: Copy-Item everything-companion/install/* companion-package/ -Force

      - name: Verify package
        shell: pwsh
        run: |
          $required = @(
            'companion-package/EverythingCompanion.exe',
            'companion-package/Install-EverythingCompanion.cmd',
            'companion-package/Install-EverythingCompanion.ps1',
            'companion-package/Uninstall-EverythingCompanion.cmd',
            'companion-package/Uninstall-EverythingCompanion.ps1'
          )
          foreach ($file in $required) {
            if (-not (Test-Path $file)) { throw "Missing package file: $file" }
          }

      - name: Create installable ZIP
        shell: pwsh
        run: Compress-Archive -Path companion-package/* -DestinationPath EverythingCompanion-win-x64.zip -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: EverythingCompanion-win-x64
          path: EverythingCompanion-win-x64.zip
          if-no-files-found: error
          retention-days: 30

      - name: Publish public release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: everything-companion-latest
          name: Everything Companion
          body: Windows x64 companion installer for Organize Your PC. Extract the ZIP and run Install-EverythingCompanion.cmd.
          make_latest: true
          target_commitish: ${{ github.sha }}
          files: EverythingCompanion-win-x64.zip
          overwrite_files: true
