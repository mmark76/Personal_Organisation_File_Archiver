name: Build Everything Companion release

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "everything-companion/**"
      - ".github/workflows/everything-companion-release.yml"
      - "THIRD_PARTY_NOTICES.md"
  push:
    branches:
      - main
    paths:
      - "everything-companion/**"
      - ".github/workflows/everything-companion-release.yml"
      - "THIRD_PARTY_NOTICES.md"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: Build Windows companion package
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Read and validate release version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content 'everything-companion/VERSION' -Raw).Trim()
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Invalid Companion version '$version'. Use semantic versioning such as 1.1.0."
          }

          $tag = "everything-companion-v$version"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Require a new immutable release tag
        shell: pwsh
        run: |
          $tag = '${{ steps.version.outputs.tag }}'
          & git ls-remote --exit-code --tags origin "refs/tags/$tag" *> $null
          $tagLookupExitCode = $LASTEXITCODE

          if ($tagLookupExitCode -eq 0) {
            throw "Release tag '$tag' already exists. Increment everything-companion/VERSION before changing or rebuilding the Companion."
          }
          if ($tagLookupExitCode -ne 2) {
            throw "Unable to confirm whether release tag '$tag' already exists."
          }

      - name: Set up .NET
        uses: actions/setup-dotnet@d4c94342e560b34958eacfc5d055d21461ed1c5d # v4.3.1
        with:
          dotnet-version: "8.0.x"

      - name: Publish self-contained companion
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          $fourPartVersion = "$version.0"

          dotnet publish everything-companion/EverythingCompanion.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output companion-package `
            -p:Version=$version `
            -p:AssemblyVersion=$fourPartVersion `
            -p:FileVersion=$fourPartVersion `
            -p:InformationalVersion="$version+$env:GITHUB_SHA"

      - name: Add installer files
        shell: pwsh
        run: Copy-Item everything-companion/install/* companion-package/ -Force

      - name: Add approved Everything SDK runtime
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest `
            -Uri 'https://www.voidtools.com/Everything-SDK.zip' `
            -OutFile 'Everything-SDK.zip'
          Invoke-WebRequest `
            -Uri 'https://www.voidtools.com/License.txt' `
            -OutFile 'Everything-License.txt'
          Expand-Archive `
            -Path 'Everything-SDK.zip' `
            -DestinationPath 'everything-sdk' `
            -Force
          $sdkDll = Get-ChildItem `
            -Path 'everything-sdk' `
            -Recurse `
            -File `
            -Filter 'Everything64.dll' `
            | Select-Object -First 1
          if ($null -eq $sdkDll) {
            throw 'Everything64.dll was not found in the official Everything SDK archive.'
          }

          $expectedSdkHash = ((Get-Content `
            'everything-companion/dependencies/Everything64.dll.sha256' `
            -Raw).Trim() -split '\s+')[0].ToUpperInvariant()
          if ($expectedSdkHash -notmatch '^[A-F0-9]{64}$') {
            throw 'The approved Everything64.dll SHA-256 file is invalid.'
          }

          $actualSdkHash = (Get-FileHash `
            -Path $sdkDll.FullName `
            -Algorithm SHA256).Hash.ToUpperInvariant()
          if ($actualSdkHash -ne $expectedSdkHash) {
            throw "Everything64.dll SHA-256 mismatch. Expected $expectedSdkHash but received $actualSdkHash. Review and approve the SDK change before building a new Companion."
          }

          Copy-Item $sdkDll.FullName companion-package/Everything64.dll -Force
          Copy-Item Everything-License.txt companion-package/THIRD-PARTY-LICENSE-EVERYTHING.txt -Force

      - name: Verify package files
        shell: pwsh
        run: |
          $required = @(
            'companion-package/EverythingCompanion.exe',
            'companion-package/Everything64.dll',
            'companion-package/THIRD-PARTY-LICENSE-EVERYTHING.txt',
            'companion-package/Install-EverythingCompanion.cmd',
            'companion-package/Install-EverythingCompanion.ps1',
            'companion-package/Verify-EverythingConnection.ps1',
            'companion-package/Uninstall-EverythingCompanion.cmd',
            'companion-package/Uninstall-EverythingCompanion.ps1'
          )
          foreach ($file in $required) {
            if (-not (Test-Path $file)) {
              throw "Missing package file: $file"
            }
            if ((Get-Item $file).Length -eq 0) {
              throw "Empty package file: $file"
            }
          }

          $version = '${{ steps.version.outputs.version }}'
          $expectedFileVersion = "$version.0"
          $versionInfo = (Get-Item 'companion-package/EverythingCompanion.exe').VersionInfo
          $actualFileVersion = "$($versionInfo.FileMajorPart).$($versionInfo.FileMinorPart).$($versionInfo.FileBuildPart).$($versionInfo.FilePrivatePart)"
          if ($actualFileVersion -ne $expectedFileVersion) {
            throw "Companion file version mismatch. Expected $expectedFileVersion but received $actualFileVersion."
          }

      - name: Create installable ZIP
        shell: pwsh
        run: Compress-Archive -Path companion-package/* -DestinationPath EverythingCompanion-win-x64.zip -Force

      - name: Build single-file EXE installer
        shell: pwsh
        run: |
          $isccCommand = Get-Command ISCC.exe -ErrorAction SilentlyContinue
          $isccPath = if ($isccCommand) {
            $isccCommand.Source
          }
          else {
            Join-Path ${env:ProgramFiles(x86)} 'Inno Setup 6\ISCC.exe'
          }

          if (-not (Test-Path $isccPath)) {
            throw "Inno Setup compiler was not found: $isccPath"
          }

          $version = '${{ steps.version.outputs.version }}'
          $sourceDir = (Resolve-Path 'companion-package').Path
          $outputDir = (Get-Location).Path

          & $isccPath `
            "/DSourceDir=$sourceDir" `
            "/DOutputDir=$outputDir" `
            "/DAppVersion=$version" `
            "/DVersionInfoVersion=$version.0" `
            'everything-companion/installer/EverythingCompanion.iss'

          if ($LASTEXITCODE -ne 0) {
            throw "Inno Setup compilation failed with exit code $LASTEXITCODE."
          }

      - name: Create versioned release assets
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          Copy-Item `
            'EverythingCompanion-win-x64.zip' `
            "EverythingCompanion-v$version-win-x64.zip" `
            -Force
          Copy-Item `
            'EverythingCompanion-Setup-win-x64.exe' `
            "EverythingCompanion-Setup-v$version-win-x64.exe" `
            -Force

      - name: Generate checksums and SPDX SBOM
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          & 'everything-companion/release/New-ReleaseMetadata.ps1' `
            -Version $version `
            -PackageDirectory 'companion-package' `
            -OutputDirectory '.' `
            -ReleaseFiles @(
              'EverythingCompanion-win-x64.zip',
              'EverythingCompanion-Setup-win-x64.exe',
              "EverythingCompanion-v$version-win-x64.zip",
              "EverythingCompanion-Setup-v$version-win-x64.exe"
            )

      - name: Verify release files and metadata
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          $releaseFiles = @(
            'EverythingCompanion-win-x64.zip',
            'EverythingCompanion-Setup-win-x64.exe',
            "EverythingCompanion-v$version-win-x64.zip",
            "EverythingCompanion-Setup-v$version-win-x64.exe",
            "EverythingCompanion-v$version.spdx.json",
            'SHA256SUMS.txt'
          )
          foreach ($file in $releaseFiles) {
            if (-not (Test-Path $file)) {
              throw "Missing release file: $file"
            }
            if ((Get-Item $file).Length -eq 0) {
              throw "Empty release file: $file"
            }
          }

          $expectedInstallerVersion = "$version.0"
          $installerVersionInfo = (Get-Item 'EverythingCompanion-Setup-win-x64.exe').VersionInfo
          $actualInstallerVersion = "$($installerVersionInfo.FileMajorPart).$($installerVersionInfo.FileMinorPart).$($installerVersionInfo.FileBuildPart).$($installerVersionInfo.FilePrivatePart)"
          if ($actualInstallerVersion -ne $expectedInstallerVersion) {
            throw "Installer file version mismatch. Expected $expectedInstallerVersion but received $actualInstallerVersion."
          }

          foreach ($line in Get-Content 'SHA256SUMS.txt') {
            if ($line -notmatch '^([a-f0-9]{64})  (.+)$') {
              throw "Invalid checksum entry: $line"
            }
            $expectedHash = $Matches[1]
            $fileName = $Matches[2]
            if (-not (Test-Path -LiteralPath $fileName -PathType Leaf)) {
              throw "Checksum target does not exist: $fileName"
            }
            $actualHash = (Get-FileHash -LiteralPath $fileName -Algorithm SHA256).Hash.ToLowerInvariant()
            if ($actualHash -ne $expectedHash) {
              throw "Checksum mismatch for $fileName."
            }
          }

      - name: Generate build provenance attestation
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        id: provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-checksums: SHA256SUMS.txt

      - name: Add provenance bundle to release files
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          Copy-Item `
            '${{ steps.provenance.outputs.bundle-path }}' `
            "EverythingCompanion-v$version.intoto.jsonl" `
            -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: EverythingCompanion-v${{ steps.version.outputs.version }}-win-x64
          path: |
            EverythingCompanion-win-x64.zip
            EverythingCompanion-Setup-win-x64.exe
            EverythingCompanion-v${{ steps.version.outputs.version }}-win-x64.zip
            EverythingCompanion-Setup-v${{ steps.version.outputs.version }}-win-x64.exe
            EverythingCompanion-v${{ steps.version.outputs.version }}.spdx.json
            EverythingCompanion-v${{ steps.version.outputs.version }}.intoto.jsonl
            SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 90

      - name: Publish immutable public release
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Everything Companion v${{ steps.version.outputs.version }}
          body: |
            Immutable Windows x64 Companion release for Organize Your PC.

            The unversioned installer asset is retained so the app's existing `/releases/latest/download/EverythingCompanion-Setup-win-x64.exe` link continues to work without any UI change.

            Verification files:
            - `SHA256SUMS.txt` — SHA-256 checksums.
            - `EverythingCompanion-v${{ steps.version.outputs.version }}.spdx.json` — SPDX 2.3 SBOM.
            - `EverythingCompanion-v${{ steps.version.outputs.version }}.intoto.jsonl` — GitHub build-provenance attestation bundle.
          generate_release_notes: true
          make_latest: true
          target_commitish: ${{ github.sha }}
          fail_on_unmatched_files: true
          preserve_order: true
          files: |
            EverythingCompanion-Setup-v${{ steps.version.outputs.version }}-win-x64.exe
            EverythingCompanion-v${{ steps.version.outputs.version }}-win-x64.zip
            EverythingCompanion-Setup-win-x64.exe
            EverythingCompanion-win-x64.zip
            SHA256SUMS.txt
            EverythingCompanion-v${{ steps.version.outputs.version }}.spdx.json
            EverythingCompanion-v${{ steps.version.outputs.version }}.intoto.jsonl
