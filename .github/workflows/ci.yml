name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  browser-tests:
    name: Browser tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check JavaScript syntax
        shell: bash
        run: |
          find assets/js tests -type f \( -name '*.js' -o -name '*.mjs' \) -print0 \
            | xargs -0 -n1 node --check

      - name: Install Playwright
        shell: bash
        run: |
          npm install --no-save --no-package-lock playwright@1.52.0
          npx playwright install --with-deps chromium

      - name: Run browser test suite
        shell: bash
        env:
          TEST_BASE_URL: http://127.0.0.1:4173
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/organize-your-pc-http.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT

          for attempt in {1..30}; do
            if curl --fail --silent --show-error \
              http://127.0.0.1:4173/tests/archive-core-tests.html > /dev/null; then
              break
            fi
            sleep 1
          done

          curl --fail --silent --show-error \
            http://127.0.0.1:4173/tests/archive-core-tests.html > /dev/null
          node tests/run-browser-tests.mjs

      - name: Show local server log on failure
        if: failure()
        shell: bash
        run: cat /tmp/organize-your-pc-http.log || true

  companion-build:
    name: Everything companion build
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore companion
        run: dotnet restore everything-companion/EverythingCompanion.csproj

      - name: Build companion
        run: dotnet build everything-companion/EverythingCompanion.csproj --configuration Release --no-restore
