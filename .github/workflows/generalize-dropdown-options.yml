name: Generalize dropdown options

on:
  push:
    paths:
      - '.github/workflows/generalize-dropdown-options.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use generic dropdown options
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          index_path = Path('index.html')
          js_path = Path('assets/js/app.js')
          workflow_path = Path('.github/workflows/generalize-dropdown-options.yml')

          index = index_path.read_text(encoding='utf-8')
          js = js_path.read_text(encoding='utf-8')

          generic_fields = {
              'workPeriods': ['Past period', 'Current period', 'Future period', 'Personal period', 'Professional period', 'Other'],
              'workSubjects': ['Project', 'Administration', 'Finance', 'Legal', 'Health and safety', 'Technical', 'Communication', 'Reference', 'Other'],
              'personalThemes': ['Family', 'Health', 'Finance', 'Travel', 'Learning', 'Home', 'Personal records', 'Reference', 'Other'],
              'interests': ['Reading', 'Writing', 'Sports', 'Music', 'Movies and series', 'Technology', 'Creative work', 'Research', 'Other'],
              'profileAreas': ['CV', 'Biography', 'Certificates', 'Training', 'Applications', 'Presentations', 'Portfolio', 'Digital profile', 'Reference', 'Other'],
              'levelTwo': ['Period', 'Role', 'Project', 'Subject', 'Theme', 'Person', 'Profile', 'Reference', 'Other'],
              'levelThree': ['General', 'Project', 'Administration', 'Finance', 'Legal', 'Technical', 'Certificate', 'Application', 'Reference', 'Other'],
              'statusDestination': ['Inbox', 'Pending', 'To review', 'Waiting', 'Reminder', 'Work', 'Personal', 'Profile', 'Reference', 'Archive', 'Other'],
          }

          def option_value(label):
              return label.upper().replace(' AND ', '_AND_').replace(' ', '_')

          def select_html(field_id, labels, multiple=False, size=None):
              attrs = f'id="{field_id}"'
              if multiple:
                  attrs += f' multiple size="{size or min(len(labels), 8)}"'
              lines = [f'<select {attrs}>']
              if not multiple:
                  lines.append('            <option value="">Select...</option>')
              for label in labels:
                  value = option_value(label)
                  lines.append(f'            <option value="{value}">{label}</option>')
              lines.append('          </select>')
              return '\n'.join(lines)

          # Replace structure textarea/select fields with generic multi-selects.
          for field_id in ['workPeriods', 'workSubjects', 'personalThemes', 'interests', 'profileAreas']:
              index = re.sub(
                  rf'<textarea id="{field_id}"[\s\S]*?</textarea>|<select id="{field_id}"[\s\S]*?</select>',
                  select_html(field_id, generic_fields[field_id], multiple=True, size=min(len(generic_fields[field_id]), 10)),
                  index,
                  count=1,
              )

          # Replace destination/status dropdowns with generic options.
          for field_id in ['levelTwo', 'levelThree', 'statusDestination']:
              index = re.sub(
                  rf'<select id="{field_id}"[\s\S]*?</select>',
                  select_html(field_id, generic_fields[field_id]),
                  index,
                  count=1,
              )

          # Make getLines support multi-select dropdowns.
          js = re.sub(
              r'function getLines\(id\) \{[\s\S]*?\n    \}',
              '''function getLines(id) {
      const element = document.getElementById(id);

      if (element.tagName === "SELECT") {
        return Array.from(element.selectedOptions)
          .map(option => option.value.trim())
          .filter(Boolean);
      }

      return element.value
        .split("\\n")
        .map(x => x.trim())
        .filter(Boolean);
    }

    function setSelectedValues(id, values) {
      const element = document.getElementById(id);
      if (element.tagName !== "SELECT") {
        element.value = values.join("\\n");
        return;
      }
      Array.from(element.options).forEach(option => {
        option.selected = values.includes(option.value);
      });
    }

    function clearField(id) {
      const element = document.getElementById(id);
      if (element.tagName === "SELECT" && element.multiple) {
        Array.from(element.options).forEach(option => option.selected = false);
        return;
      }
      element.value = "";
    }''',
              js,
              count=1,
          )

          # Update example loader to generic values.
          js = re.sub(r'document\.getElementById\("mainRole"\)\.value = .*?;', 'document.getElementById("mainRole").value = "Civil Engineer";', js, count=1)
          js = re.sub(r'document\.getElementById\("workPeriods"\)\.value =[\s\S]*?;', 'setSelectedValues("workPeriods", ["PAST_PERIOD", "CURRENT_PERIOD", "PROFESSIONAL_PERIOD"]);', js, count=1)
          js = re.sub(r'document\.getElementById\("workSubjects"\)\.value =[\s\S]*?;', 'setSelectedValues("workSubjects", ["PROJECT", "ADMINISTRATION", "HEALTH_AND_SAFETY", "REFERENCE"]);', js, count=1)
          js = re.sub(r'document\.getElementById\("personalThemes"\)\.value =[\s\S]*?;', 'setSelectedValues("personalThemes", ["FAMILY", "HEALTH", "FINANCE", "LEARNING", "REFERENCE"]);', js, count=1)
          js = re.sub(r'document\.getElementById\("interests"\)\.value =[\s\S]*?;', 'setSelectedValues("interests", ["READING", "WRITING", "TECHNOLOGY", "RESEARCH"]);', js, count=1)
          js = re.sub(r'document\.getElementById\("profileAreas"\)\.value =[\s\S]*?;', 'setSelectedValues("profileAreas", ["CV", "BIOGRAPHY", "CERTIFICATES", "APPLICATIONS", "REFERENCE"]);', js, count=1)

          for field_id in ['workPeriods', 'workSubjects', 'personalThemes', 'interests', 'profileAreas']:
              js = js.replace(f'document.getElementById("{field_id}").value = "";', f'clearField("{field_id}");')

          index_path.write_text(index, encoding='utf-8')
          js_path.write_text(js, encoding='utf-8')

          if workflow_path.exists():
              workflow_path.unlink()
          PY

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html assets/js/app.js .github/workflows/generalize-dropdown-options.yml
          git commit -m "Generalize dropdown options" || echo "No changes to commit"
          git push
