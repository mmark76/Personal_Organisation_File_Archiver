name: Materialize staged audit reports

on:
  push:
    branches:
      - docs/add-numbered-audit-reports
    paths:
      - ".reports-upload/READY"

permissions:
  contents: write

jobs:
  materialize:
    name: Decode and verify reports
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out staging branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: docs/add-numbered-audit-reports

      - name: Decode and verify reports
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports

          find .reports-upload -maxdepth 1 -type f -name 'full-*.b64' -print0 \
            | sort -z \
            | xargs -0 cat \
            | tr -d '\r\n' \
            | base64 --decode \
            | gzip --decompress \
            > reports/01_FULL_AUDIT_REPORT_2026-06-21.md

          find .reports-upload -maxdepth 1 -type f -name 'post-*.b64' -print0 \
            | sort -z \
            | xargs -0 cat \
            | tr -d '\r\n' \
            | base64 --decode \
            | gzip --decompress \
            > reports/02_POST_AUDIT_VERIFICATION_REPORT_2026-06-21.md

          printf '%s  %s\n' \
            '3c46651a4b607e9204b6419921793b6669bea051989f35f5fdd2aed175135659' \
            'reports/01_FULL_AUDIT_REPORT_2026-06-21.md' \
            | sha256sum --check

          printf '%s  %s\n' \
            '3849bb89dadfd579e41fcf88ba25e9ff1e3083c5ed7e466829e84a8a0f426d5a' \
            'reports/02_POST_AUDIT_VERIFICATION_REPORT_2026-06-21.md' \
            | sha256sum --check

      - name: Replace staging files with final reports
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .reports-upload
          rm .github/workflows/temporary-materialize-audit-reports.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add numbered audit reports"
          git push origin HEAD:docs/add-numbered-audit-reports
