name: Fix structure category and add subcategory count

on:
  push:
    paths:
      - '.github/workflows/fix-structure-category-and-subcount.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Remove structure category dropdown and add subcategory count
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          index_path = Path('index.html')
          js_path = Path('assets/js/app.js')
          workflow_path = Path('.github/workflows/fix-structure-category-and-subcount.yml')

          index = index_path.read_text(encoding='utf-8')
          js = js_path.read_text(encoding='utf-8')

          index = re.sub(
              r'\s*<label for="structureMainCategory"[\s\S]*?</select>\s*',
              '\n',
              index,
              count=1,
          )

          subcategory_field = '''<label for="subcategoryCount" data-i18n="subcategoryCount">Number of subcategories per main category</label>
          <select id="subcategoryCount">
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2" selected>2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="Other">Other</option>
          </select>'''

          if 'id="subcategoryCount"' not in index:
              index = index.replace(
                  '<label data-i18n="memoryQuestion">When searching for a file, what do you remember first?</label>',
                  subcategory_field + '\n\n          <label data-i18n="memoryQuestion">When searching for a file, what do you remember first?</label>',
                  1,
              )

          if 'subcategoryCount:' not in js:
              js = js.replace('mainRole: "Main work / life role",', 'mainRole: "Main work / life role",\n        subcategoryCount: "Number of subcategories per main category",', 1)
              js = js.replace('mainRole: "Κύριος επαγγελματικός / προσωπικός ρόλος",', 'mainRole: "Κύριος επαγγελματικός / προσωπικός ρόλος",\n        subcategoryCount: "Αριθμός υποκατηγοριών ανά κύρια κατηγορία",', 1)

          if 'const subcategoryCount' not in js:
              js = js.replace(
                  'const patterns = getCheckedMemoryPatterns();',
                  'const patterns = getCheckedMemoryPatterns();\n      const subcategoryCount = document.getElementById("subcategoryCount").value || "2";',
                  1,
              )
              js = js.replace(
                  'output += "Main role: " + mainRole + "\\n\\n";',
                  'output += "Main role: " + mainRole + "\\n";\n      output += "Requested subcategories per main category: " + subcategoryCount + "\\n\\n";',
                  1,
              )

          js = js.replace('clearField("subcategoryCount");', 'document.getElementById("subcategoryCount").value = "2";')
          if 'document.getElementById("subcategoryCount").value = "2";' not in js:
              js = js.replace(
                  'document.querySelectorAll(".memoryPattern").forEach(x => x.checked = false);',
                  'document.querySelectorAll(".memoryPattern").forEach(x => x.checked = false);\n      document.getElementById("subcategoryCount").value = "2";',
                  1,
              )

          index_path.write_text(index, encoding='utf-8')
          js_path.write_text(js, encoding='utf-8')

          if workflow_path.exists():
              workflow_path.unlink()
          PY

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html assets/js/app.js .github/workflows/fix-structure-category-and-subcount.yml
          git commit -m "Fix structure category handling and add subcategory count" || echo "No changes to commit"
          git push
