name: Everything companion installer

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "companion-v*"
    paths:
      - "everything-companion/**"
      - ".github/workflows/companion-installer.yml"

permissions:
  contents: write

concurrency:
  group: companion-installer-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-installer:
    name: Build Windows installer
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Set installer version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF_TYPE -eq "tag") {
            $version = $env:GITHUB_REF_NAME -replace '^companion-v', ''
          } else {
            $version = "0.0.$env:GITHUB_RUN_NUMBER"
          }

          if ($version -notmatch '^\d+\.\d+\.\d+(\.\d+)?$') {
            throw "Companion version '$version' is not a valid numeric installer version."
          }

          "COMPANION_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Publish self-contained companion
        shell: pwsh
        run: |
          dotnet publish everything-companion/EverythingCompanion.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output everything-companion/publish `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:DebugType=None `
            -p:DebugSymbols=false

      - name: Build setup executable
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            choco install innosetup --no-progress --yes
          }

          if (-not (Test-Path $iscc)) {
            throw "Inno Setup compiler was not found."
          }

          & $iscc "/DMyAppVersion=$env:COMPANION_VERSION" "everything-companion\installer\EverythingCompanionSetup.iss"
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: EverythingCompanionSetup-${{ env.COMPANION_VERSION }}
          path: everything-companion/installer/output/EverythingCompanionSetup.exe
          if-no-files-found: error

      - name: Publish tagged installer release
        if: github.ref_type == 'tag'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $installer = "everything-companion\installer\output\EverythingCompanionSetup.exe"
          gh release view $env:GITHUB_REF_NAME --repo $env:GITHUB_REPOSITORY *> $null

          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:GITHUB_REF_NAME $installer --clobber --repo $env:GITHUB_REPOSITORY
          } else {
            gh release create $env:GITHUB_REF_NAME $installer `
              --generate-notes `
              --title "Everything Companion $env:COMPANION_VERSION" `
              --repo $env:GITHUB_REPOSITORY
          }
