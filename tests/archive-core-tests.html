    "use strict";

    class FakeFileHandle {
      constructor(name, content = "", options = {}) {
        this.kind = "file";
        this.name = name;
        this.content = content;
        this.reportedSize = options.reportedSize ?? null;
      }

      async createWritable() {
        const handle = this;
        const chunks = [];

        return {
          async write(chunk) {
            chunks.push(chunk);
          },
          async close() {
            let content = "";

            for (const chunk of chunks) {
              if (chunk instanceof Blob) {
                content += await chunk.text();
              } else {
                content += String(chunk);
              }
            }

            handle.content = content;
          },
          async abort() {
            chunks.length = 0;
          }
        };
      }

      async getFile() {
        if (this.reportedSize !== null) {
          return { name: this.name, size: this.reportedSize };
        }

        return new File([this.content], this.name);
      }
    }

    class FakeDirectoryHandle {
      constructor(name, options = {}) {
        this.kind = "directory";
        this.name = name;
        this.directories = new Map();
        this.files = new Map();
        this.permissionState = options.permissionState || "granted";
        this.requestPermissionState = options.requestPermissionState || this.permissionState;
        this.events = options.events || [];
        this.parent = options.parent || null;
        this.entriesGate = options.entriesGate || null;
        this.onEntriesStart = options.onEntriesStart || null;
      }

      async queryPermission(options = {}) {
        this.events.push({ type: "query-permission", mode: options.mode, handle: this.name });
        return this.permissionState;
      }

      async requestPermission(options = {}) {
        this.events.push({ type: "request-permission", mode: options.mode, handle: this.name });
        this.permissionState = this.requestPermissionState;
        return this.permissionState;
      }

      async isSameEntry(otherHandle) {
        return this === otherHandle;
      }

      async resolve(possibleChildHandle) {
        const parts = [];
        let current = possibleChildHandle;

        while (current && current !== this) {
          parts.unshift(current.name);
          current = current.parent;
        }

        return current === this ? parts : null;
      }

      async getDirectoryHandle(name, options = {}) {
        if (this.directories.has(name)) {
          return this.directories.get(name);
        }

        if (!options.create) {
          throw new DOMException("Directory not found", "NotFoundError");
        }

        this.events.push({ type: "create-directory", name, handle: this.name });
        const directory = new FakeDirectoryHandle(name, {
          permissionState: this.permissionState,
          requestPermissionState: this.requestPermissionState,
          events: this.events,
          parent: this
        });
        this.directories.set(name, directory);
        return directory;
      }

      async getFileHandle(name, options = {}) {
        if (this.files.has(name)) {
          return this.files.get(name);
        }

        if (!options.create) {
          throw new DOMException("File not found", "NotFoundError");
        }

        this.events.push({ type: "create-file", name, handle: this.name });
        const file = new FakeFileHandle(name);
        this.files.set(name, file);
        return file;
      }

      async removeEntry(name, options = {}) {
        if (this.files.has(name)) {
          this.events.push({ type: "remove-file", name, handle: this.name });
          this.files.delete(name);
          return;
        }

        const directory = this.directories.get(name);
        if (!directory) {
          throw new DOMException("Entry not found", "NotFoundError");
        }

        if (!options.recursive && (directory.files.size > 0 || directory.directories.size > 0)) {
          throw new DOMException("Directory is not empty", "InvalidModificationError");
        }

        this.events.push({ type: "remove-directory", name, handle: this.name, recursive: Boolean(options.recursive) });
        this.directories.delete(name);
      }

      async *entries() {
        this.onEntriesStart?.();
        if (this.entriesGate) await this.entriesGate;

        for (const entry of this.directories) {
          yield entry;
        }

        for (const entry of this.files) {
          yield entry;
        }
      }
    }

    const tests = [];
    const alerts = [];

    window.alert = message => alerts.push(String(message));
    window.AppModals = {
      closeModal() {}
    };

    function test(name, callback) {
      tests.push({ name, callback });
    }

    function assert(condition, message) {
      if (!condition) {
        throw new Error(message);
      }
    }

    function createDeferred() {
      let resolve;
      const promise = new Promise(resolvePromise => {
        resolve = resolvePromise;
      });

      return { promise, resolve };
    }

    function countOccurrences(value, fragment) {
      return String(value).split(fragment).length - 1;
    }

    function findNodeByName(node, name) {
      if (!node) return null;
      if (node.name === name) return node;

      for (const child of node.children || []) {
        const found = findNodeByName(child, name);
        if (found) return found;
      }

      return null;
    }

    function createTestTree() {
      return {
        id: "documents",
        name: "DOCUMENTS",
        fixed: true,
        branch: null,
        thinkingType: null,
        childLayerType: null,
        children: [
          {
            id: "profile",
            name: "01_PROFILE",
            fixed: true,
            branch: "profile",
            thinkingType: null,
            childLayerType: "003_FUNCTIONAL",
            children: [
              {
                id: "cvs",
                name: "CVS",
                fixed: false,
                branch: "profile",
                thinkingType: "003_FUNCTIONAL",
                childLayerType: null,
                children: []
              }
            ]
          },
          {
            id: "personal",
            name: "02_PERSONAL",
            fixed: true,
            branch: "personal",
            thinkingType: null,
            childLayerType: null,
            children: []
          },
          {
            id: "professional",
            name: "03_PROFESSIONAL",
            fixed: true,
            branch: "professional",
            thinkingType: null,
            childLayerType: null,
            children: []
          }
        ]
      };
    }

    async function getDirectoryByPath(rootHandle, path) {
      const parts = path.split("/").filter(Boolean);
      let currentHandle = rootHandle;

      for (const part of parts) {
        currentHandle = await currentHandle.getDirectoryHandle(part);
      }

      return currentHandle;
    }

    function resetArchiveMode() {
      window.AppState.setActiveMode("archive");
      window.AppState.resetMode("archive");
      window.AppState.setActiveMode("archive");
      window.AppState.setTree(createTestTree());
      window.AppUtils.setText("#archiveResultBox", "");
      window.FolderTreeRender.renderArchivePreview();
    }

    function resetFolderArchiveMode() {
      window.AppState.setActiveMode("archiveFolder");
      window.AppState.resetMode("archiveFolder");
      window.AppState.setActiveMode("archiveFolder");
      window.AppUtils.setText("#folderArchiveResultBox", "");
      window.FolderTreeRender.renderArchivePreview();
    }

    test("Archive file copies to the selected folder and avoids overwriting duplicate names", async () => {
      resetArchiveMode();

      const rootHandle = new FakeDirectoryHandle(window.FolderCreation.appRootFolderName);
      window.showDirectoryPicker = async () => rootHandle;
      window.AppState.setAppRootHandle(rootHandle);

      window.FolderTree.selectArchiveFolder("cvs");
      window.AppState.setLoadedFile(new File(["first version"], "sample.txt", { type: "text/plain" }));

      await window.FileArchive.archiveLoadedFile();

      const destination = await getDirectoryByPath(rootHandle, "01_PROFILE/CVS");
      const firstFile = await destination.getFileHandle("sample.txt");
      assert(firstFile.content === "first version", "The first file was not copied to the selected destination.");

      window.AppState.setLoadedFile(new File(["second version"], "sample.txt", { type: "text/plain" }));
      await window.FileArchive.archiveLoadedFile();

      const duplicateFile = await destination.getFileHandle("sample_copy_1.txt");
      assert(duplicateFile.content === "second version", "The duplicate file did not receive a safe copy name.");
      assert(firstFile.content === "first version", "The original archived file was overwritten.");
    });

    test("Folder creation creates expected paths and respects naming and duplicate rules", async () => {
      const rootHandle = new FakeDirectoryHandle(window.FolderCreation.appRootFolderName);

      await window.FolderCreation.createDirectoryPath(rootHandle, "01_PROFILE/CVS");
      await window.FolderCreation.createDirectoryPath(rootHandle, "02_PERSONAL/HEALTH");

      const cvsFolder = await getDirectoryByPath(rootHandle, "01_PROFILE/CVS");
      const healthFolder = await getDirectoryByPath(rootHandle, "02_PERSONAL/HEALTH");

      assert(cvsFolder.name === "CVS", "The CVS folder was not created correctly.");
      assert(healthFolder.name === "HEALTH", "The HEALTH folder was not created correctly.");
      assert(window.AppUtils.sanitizeFolderName("my folder") === "MY_FOLDER", "Spaces should become underscores and names should be uppercase.");
      assert(window.AppUtils.sanitizeFolderName("bad:name") === "BAD_NAME", "Invalid Windows path characters should be removed.");
      assert(window.AppUtils.sanitizeFolderName("CON") === "", "Windows reserved device names should not be accepted.");

      window.AppState.setActiveMode("buildTree");
      window.AppState.resetMode("buildTree");
      window.AppState.setActiveMode("buildTree");
      alerts.length = 0;

      const input = document.getElementById("folderNameInput");
      const select = document.getElementById("thinkingTypeSelect");
      select.value = "003_FUNCTIONAL";

      window.AppState.state.selectedParentId = "profile";
      input.value = "CVS";
      window.FolderTree.confirmAddFolder();

      window.AppState.state.selectedParentId = "profile";
      input.value = "CVS";
      window.FolderTree.confirmAddFolder();

      const profile = window.FolderTree.findNodeById("profile");
      assert(profile.children.length === 1, "Duplicate sibling folder names should not be added.");
      assert(alerts.includes(window.AppMessages.duplicateFolderName), "A duplicate-folder warning should be shown.");
    });

    test("Archive destination selection stores only a valid folder node", async () => {
      resetArchiveMode();

      assert(window.AppState.state.selectedArchiveFolderId === null, "No archive destination should be selected initially.");

      window.FolderTree.selectArchiveFolder("missing-node");
      assert(window.AppState.state.selectedArchiveFolderId === null, "A missing node should not be accepted as a destination.");

      window.FolderTree.selectArchiveFolder("documents");
      assert(window.AppState.state.selectedArchiveFolderId === null, "The internal DOCUMENTS root should not be accepted as an archive destination.");

      window.FolderTree.selectArchiveFolder("cvs");
      assert(window.AppState.state.selectedArchiveFolderId === "cvs", "A valid folder node should be stored as the selected destination.");
      assert(
        document.getElementById("archiveResultBox").textContent.includes("01_PROFILE/CVS"),
        "The selected destination path should be visible to the user."
      );
    });

    test("Existing tree archiving writes relative to the selected root without another app wrapper", async () => {
      resetArchiveMode();

      const events = [];
      const selectedRoot = new FakeDirectoryHandle(window.FolderCreation.appRootFolderName, {
        permissionState: "prompt",
        requestPermissionState: "granted",
        events
      });
      await selectedRoot.getDirectoryHandle("PROFILE", { create: true });
      events.length = 0;

      let pickerOptions = null;
      window.showDirectoryPicker = async options => {
        pickerOptions = options;
        return selectedRoot;
      };

      await window.FolderTreeExisting.chooseExistingFolderTreeForArchive();
      const selectedRootNode = window.AppState.state.tree.children[0];
      const profileNode = findNodeByName(window.AppState.state.tree, "PROFILE");
      const rootDestination = window.FolderTreeExisting.getArchiveDestination(selectedRootNode.id);

      assert(pickerOptions?.mode === "readwrite", "The existing archive root picker should request read/write access.");
      assert(window.AppState.state.appRootHandle === selectedRoot, "The selected existing root handle should be retained.");
      assert(rootDestination.relativePath === "", "The selected root should resolve to the destination handle itself.");
      assert(rootDestination.displayPath === "Organize Your PC", "The selected root name should appear once in its display path.");
      assert(profileNode, "The existing PROFILE folder should be available as a destination.");

      window.FolderTree.selectArchiveFolder(profileNode.id);
      window.AppState.setLoadedFile(new File(["existing root file"], "existing.txt", { type: "text/plain" }));
      await window.FileArchive.archiveLoadedFile();

      const profileDirectory = await selectedRoot.getDirectoryHandle("PROFILE");
      const archivedFile = await profileDirectory.getFileHandle("existing.txt");
      const resultText = document.getElementById("archiveResultBox").textContent;
      const permissionRequestIndex = events.findIndex(event => event.type === "request-permission");
      const fileCreationIndex = events.findIndex(event => event.type === "create-file" && event.name === "existing.txt");

      assert(archivedFile.content === "existing root file", "The file should be written below the selected existing root.");
      assert(!selectedRoot.directories.has(window.FolderCreation.appRootFolderName), "No additional Organize Your PC wrapper should be created.");
      assert(countOccurrences(resultText, window.FolderCreation.appRootFolderName) === 1, "The selected root name should appear only once in the result path.");
      assert(permissionRequestIndex >= 0 && permissionRequestIndex < fileCreationIndex, "Read/write permission should be requested before file creation.");
    });

    test("Permission denial leaves the existing tree unchanged and creates no output", async () => {
      resetArchiveMode();

      const events = [];
      const deniedRoot = new FakeDirectoryHandle("Denied Existing Root", {
        permissionState: "prompt",
        requestPermissionState: "denied",
        events
      });
      const treeBeforeSelection = window.AppState.state.tree;
      window.showDirectoryPicker = async () => deniedRoot;

      await window.FolderTreeExisting.chooseExistingFolderTreeForArchive();

      assert(document.getElementById("archiveResultBox").textContent === window.FolderCreation.permissionDeniedMessage, "Permission denial should display a clear message.");
      assert(window.AppState.state.tree === treeBeforeSelection, "A denied root should not replace the current archive tree.");
      assert(!events.some(event => event.type === "create-directory" || event.type === "create-file"), "Permission denial should not create partial output.");
    });

    test("Permission fallback requires explicit query approval when requests are unavailable", async () => {
      const promptOnlyHandle = new FakeDirectoryHandle("Prompt Only", {
        permissionState: "prompt"
      });
      promptOnlyHandle.requestPermission = undefined;

      const deniedOnlyHandle = new FakeDirectoryHandle("Denied Only", {
        permissionState: "denied"
      });
      deniedOnlyHandle.requestPermission = undefined;

      const grantedOnlyHandle = new FakeDirectoryHandle("Granted Only", {
        permissionState: "granted"
      });
      grantedOnlyHandle.requestPermission = undefined;

      const legacyHandle = new FakeDirectoryHandle("Legacy Handle");
      legacyHandle.queryPermission = undefined;
      legacyHandle.requestPermission = undefined;

      assert(
        !(await window.FolderCreation.ensureReadWritePermission(promptOnlyHandle)),
        "A prompt query result should not be treated as write permission when requestPermission is unavailable."
      );
      assert(
        !(await window.FolderCreation.ensureReadWritePermission(deniedOnlyHandle)),
        "A denied query result should not be treated as write permission when requestPermission is unavailable."
      );
      assert(
        await window.FolderCreation.ensureReadWritePermission(grantedOnlyHandle),
        "An explicit granted query result should allow writes when requestPermission is unavailable."
      );
      assert(
        await window.FolderCreation.ensureReadWritePermission(legacyHandle),
        "A handle without either permission method should retain the graceful compatibility fallback."
      );
    });

    test("Picker-level write denial is reported clearly without changing tree state", async () => {
      resetArchiveMode();

      const treeBeforeSelection = window.AppState.state.tree;
      const originalEnsureReadWritePermission = window.FolderCreation.ensureReadWritePermission;
      let permissionCheckCalled = false;

      window.FolderCreation.ensureReadWritePermission = async () => {
        permissionCheckCalled = true;
        return true;
      };
      window.showDirectoryPicker = async () => {
        throw new DOMException("The request was denied or cancelled.", "AbortError");
      };

      try {
        await window.FolderTreeExisting.chooseExistingFolderTreeForArchive();
      } finally {
        window.FolderCreation.ensureReadWritePermission = originalEnsureReadWritePermission;
      }

      assert(
        document.getElementById("archiveResultBox").textContent ===
          "Destination selection was cancelled or read/write permission was not granted. No files or folders were created.",
        "Picker-level write denial should explain both possible causes and confirm that no output was created."
      );
      assert(window.AppState.state.tree === treeBeforeSelection, "A picker-level denial should preserve the current archive tree.");
      assert(window.AppState.state.appRootHandle === null, "A picker-level denial should not retain a destination handle.");
      assert(!permissionCheckCalled, "Permission verification should not run when the picker returns no handle.");
    });

    test("Picker-level write denial is clear in new-structure creation", async () => {
      window.AppState.setActiveMode("buildTree");
      window.AppState.resetMode("buildTree");
      window.AppState.setActiveMode("buildTree");
      alerts.length = 0;
      window.showDirectoryPicker = async () => {
        throw new DOMException("The request was denied or cancelled.", "AbortError");
      };

      await window.FolderCreation.createFoldersOnComputer();

      assert(
        alerts.at(-1) === "Destination selection was cancelled or read/write permission was not granted. No files or folders were created.",
        "New-structure picker denial should display the clear write-access message."

    });

    test("Picker-level write denial is clear in default-tree file archiving", async () => {
      resetArchiveMode();
      const treeBeforeArchive = window.AppState.state.tree;
      window.FolderTree.selectArchiveFolder("cvs");
      window.AppState.setLoadedFile(new File(["denied archive"], "denied.txt", { type: "text/plain" }));
      window.showDirectoryPicker = async () => {
        throw new DOMException("The request was denied or cancelled.", "AbortError");
      };

      assert(
        document.getElementById("archiveResultBox").textContent ===

      assert(window.AppState.state.tree === treeBeforeArchive, "File archive picker denial should preserve the destination tree.");
      assert(window.AppState.state.appRootHandle === null, "File archive picker denial should not retain a destination handle.");

    test("Picker-level write denial is clear in default-tree folder archiving", async () => {
      resetFolderArchiveMode();
      window.AppState.setTree(createTestTree());
      const treeBeforeArchive = window.AppState.state.tree;
      window.FolderTree.selectArchiveFolder("cvs");
      window.AppState.setLoadedFolder(new FakeDirectoryHandle("Denied Source Folder"));
      window.showDirectoryPicker = async () => {
        throw new DOMException("The request was denied or cancelled.", "AbortError");
      };

      await window.FolderArchive.archiveLoadedFolder();

      assert(
        document.getElementById("folderArchiveResultBox").textContent ===
          "Destination selection was cancelled or read/write permission was not granted. No files or folders were created.",
        "Folder archive picker denial should display the clear write-access message."
      );
      assert(window.AppState.state.tree === treeBeforeArchive, "Folder archive picker denial should preserve the destination tree.");
      assert(window.AppState.state.appRootHandle === null, "Folder archive picker denial should not retain a destination handle.");
    });

    test("Stale existing-tree loads cannot update another mode or overwrite newer tree state", async () => {
      resetArchiveMode();
      window.AppState.resetMode("archiveFolder");

      const archiveState = window.AppState.getModeState("archive");
      const folderArchiveState = window.AppState.getModeState("archiveFolder");
      const initialArchiveTree = archiveState.tree;
      const initialFolderArchiveTree = folderArchiveState.tree;
      const modeChangeGate = createDeferred();
      const modeChangeStarted = createDeferred();
      const delayedModeRoot = new FakeDirectoryHandle("Delayed Mode Root", {
        entriesGate: modeChangeGate.promise,
        onEntriesStart: modeChangeStarted.resolve
      });
      window.showDirectoryPicker = async () => delayedModeRoot;

      const delayedModeLoad = window.FolderTreeExisting.chooseExistingFolderTreeForArchive();
      await modeChangeStarted.promise;
      window.AppState.setActiveMode("archiveFolder");
      modeChangeGate.resolve();
      await delayedModeLoad;

      assert(archiveState.tree === initialArchiveTree, "A load invalidated by a mode change should leave its initiating tree unchanged.");
      assert(archiveState.appRootHandle === null, "A load invalidated by a mode change should not retain its root handle.");
      assert(folderArchiveState.tree === initialFolderArchiveTree, "A delayed load should not replace the newly active mode's tree.");
      assert(folderArchiveState.appRootHandle === null, "A delayed load should not attach its root handle to the newly active mode.");

      resetArchiveMode();
      const newerLoadState = window.AppState.getModeState("archive");
      const olderLoadGate = createDeferred();
      const olderLoadStarted = createDeferred();
      const olderRoot = new FakeDirectoryHandle("Older Root", {
        entriesGate: olderLoadGate.promise,
        onEntriesStart: olderLoadStarted.resolve
      });
      const newerRoot = new FakeDirectoryHandle("Newer Root");
      const pickedRoots = [olderRoot, newerRoot];
      window.showDirectoryPicker = async () => pickedRoots.shift();

      const olderLoad = window.FolderTreeExisting.chooseExistingFolderTreeForArchive();
      await olderLoadStarted.promise;
      await window.FolderTreeExisting.chooseExistingFolderTreeForArchive();
      olderLoadGate.resolve();
      await olderLoad;

      assert(newerLoadState.tree.children[0]?.name === "Newer Root", "An older load should not overwrite the result of a newer load.");
      assert(newerLoadState.appRootHandle === newerRoot, "The newer load should retain only its own selected root handle.");

      resetArchiveMode();
      const replacementState = window.AppState.getModeState("archive");
      const replacementGate = createDeferred();
      const replacementStarted = createDeferred();
      const delayedReplacementRoot = new FakeDirectoryHandle("Delayed Replacement Root", {
        entriesGate: replacementGate.promise,
        onEntriesStart: replacementStarted.resolve
      });
      const replacementTree = createTestTree();
      window.showDirectoryPicker = async () => delayedReplacementRoot;

      const delayedReplacementLoad = window.FolderTreeExisting.chooseExistingFolderTreeForArchive();
      await replacementStarted.promise;
      window.AppState.setTree(replacementTree);
      replacementGate.resolve();
      await delayedReplacementLoad;

      assert(replacementState.tree === replacementTree, "A delayed load should not overwrite a replacement tree.");
      assert(replacementState.appRootHandle === null, "A delayed load should not retain a handle after its tree is replaced.");
    });

    test("Existing tree folder archiving uses the retained selected root", async () => {
      resetFolderArchiveMode();

      const events = [];
      const selectedRoot = new FakeDirectoryHandle("Existing Archive", {
        permissionState: "prompt",
        requestPermissionState: "granted",
        events
      });
      await selectedRoot.getDirectoryHandle("DESTINATION", { create: true });
      events.length = 0;
      window.showDirectoryPicker = async () => selectedRoot;

      await window.FolderTreeExisting.chooseExistingFolderTreeForFolderArchive();
      const destinationNode = findNodeByName(window.AppState.state.tree, "DESTINATION");
      window.FolderTree.selectArchiveFolder(destinationNode.id);

      const sourceFolder = new FakeDirectoryHandle("Source Folder");
      const sourceFile = await sourceFolder.getFileHandle("note.txt", { create: true });
      sourceFile.content = "folder archive content";
      window.AppState.setLoadedFolder(sourceFolder);

      await window.FolderArchive.archiveLoadedFolder();

      const destination = await selectedRoot.getDirectoryHandle("DESTINATION");
      const archivedFolder = await destination.getDirectoryHandle("Source Folder");
      const archivedFile = await archivedFolder.getFileHandle("note.txt");

      assert(archivedFile.content === "folder archive content", "The source folder should be copied below the retained existing root.");
      assert(!selectedRoot.directories.has(window.FolderCreation.appRootFolderName), "Folder archiving should not create an extra app wrapper.");
    });

    test("Oversized folder archives stop before destination selection or filesystem writes", async () => {
      const megabyte = 1024 * 1024;
      const scenarios = [
        {
          expectedReason: "one file is larger than 500 MB",
          createSource() {
            const source = new FakeDirectoryHandle("Single Large File");
            source.files.set("large.bin", new FakeFileHandle("large.bin", "", { reportedSize: 500 * megabyte + 1 }));
            return source;
          }
        },
        {
          expectedReason: "its total size is larger than 1 GB",
          createSource() {
            const source = new FakeDirectoryHandle("Large Total Size");
            for (let index = 1; index <= 3; index += 1) {
              const name = `part-${index}.bin`;
              source.files.set(name, new FakeFileHandle(name, "", { reportedSize: 400 * megabyte }));
            }
            return source;
          }
        },
        {
          expectedReason: "it contains more than 2,000 files",
          createSource() {
            const source = new FakeDirectoryHandle("Too Many Files");
            for (let index = 1; index <= 2001; index += 1) {
              const name = `file-${index}.txt`;
              source.files.set(name, new FakeFileHandle(name, "x"));
            }
            return source;
          }
        },
        {
          expectedReason: "its folder nesting is deeper than 20 levels",
          createSource() {
            const source = new FakeDirectoryHandle("Too Deep");
            let current = source;

            for (let depth = 1; depth <= 21; depth += 1) {
              const child = new FakeDirectoryHandle(`level-${depth}`, { parent: current });
              current.directories.set(child.name, child);
              current = child;
            }

            return source;
          }
        },
        {
          expectedReason: "it contains more than 5,000 files and folders",
          createSource() {
            const source = new FakeDirectoryHandle("Too Many Entries");
            for (let index = 1; index <= 5001; index += 1) {
              const child = new FakeDirectoryHandle(`folder-${index}`, { parent: source });
              source.directories.set(child.name, child);
            }
            return source;
          }
        }
      ];

      for (const scenario of scenarios) {
        resetFolderArchiveMode();
        window.AppState.setTree(createTestTree());
        window.FolderTree.selectArchiveFolder("cvs");
        window.AppState.setLoadedFolder(scenario.createSource());

        let pickerCalls = 0;
        window.showDirectoryPicker = async () => {
          pickerCalls += 1;
          return new FakeDirectoryHandle("Unexpected Destination");
        };

        await window.FolderArchive.archiveLoadedFolder();

        const result = document.getElementById("folderArchiveResultBox").textContent;
        assert(pickerCalls === 0, `${scenario.expectedReason}: destination selection should not start.`);
        assert(result.includes(scenario.expectedReason), `${scenario.expectedReason}: the warning should identify the exceeded limit.`);
        assert(result.includes("No files or folders were created"), `${scenario.expectedReason}: the warning should confirm that no output exists.`);
        assert(result.includes("Copy and Paste in File Explorer"), `${scenario.expectedReason}: the warning should recommend manual copying.`);
      }
    });

    test("Folder archiving fails closed when destination containment cannot be verified", async () => {
      const scenarios = [
        {
          name: "missing resolve",
          configureSource(source) {
            source.resolve = undefined;
          }
        },
        {
          name: "throwing resolve",
          configureSource(source) {
            source.resolve = async () => {
              throw new DOMException("Relationship check failed", "InvalidStateError");
            };
          }
        }
      ];

      for (const scenario of scenarios) {
        resetFolderArchiveMode();
        window.AppState.setTree(createTestTree());
        window.FolderTree.selectArchiveFolder("cvs");

        const source = new FakeDirectoryHandle(`Source ${scenario.name}`);
        scenario.configureSource(source);
        window.AppState.setLoadedFolder(source);

        const selectedParent = new FakeDirectoryHandle(`Destination ${scenario.name}`);
        window.showDirectoryPicker = async () => selectedParent;

        await window.FolderArchive.archiveLoadedFolder();

        const result = document.getElementById("folderArchiveResultBox").textContent;
        assert(
          result.includes("could not safely verify that the destination is outside the source folder"),
          `${scenario.name}: the user should receive a clear containment verification error.`
        );
        assert(result.includes("No files or folders were created"), `${scenario.name}: the message should confirm that no output exists.`);
        assert(
          !selectedParent.directories.has(window.FolderCreation.appRootFolderName),
          `${scenario.name}: the app root must not be created before containment is verified.`
        );
      }
    });

    test("Folder archiving rejects a destination inside the source before writes", async () => {
      resetFolderArchiveMode();
      window.AppState.setTree(createTestTree());
      window.FolderTree.selectArchiveFolder("cvs");

      const source = new FakeDirectoryHandle("Source With Nested Destination");
      const nestedDestination = await source.getDirectoryHandle("Nested Destination", { create: true });
      source.events.length = 0;
      window.AppState.setLoadedFolder(source);
      window.showDirectoryPicker = async () => nestedDestination;

      await window.FolderArchive.archiveLoadedFolder();

      assert(
        document.getElementById("folderArchiveResultBox").textContent ===
          "Archive destination cannot be inside the source folder. Please choose a destination outside the folder you are archiving.",
        "A nested destination should be rejected with the existing clear message."
      );
      assert(
        !nestedDestination.directories.has(window.FolderCreation.appRootFolderName),
        "The app root must not be created inside the source folder."
      );
      assert(
        !source.events.some(event => event.type === "create-directory" || event.type === "create-file"),
        "Containment rejection should not create files or folders."
      );
    });

    test("A mid-copy folder failure removes the incomplete archive completely", async () => {
      resetFolderArchiveMode();
      window.AppState.setTree(createTestTree());
      window.FolderTree.selectArchiveFolder("cvs");

      const destinationRoot = new FakeDirectoryHandle(window.FolderCreation.appRootFolderName);
      window.AppState.state.appRootHandle = destinationRoot;
      window.AppState.state.appRootTree = window.AppState.state.tree;

      const source = new FakeDirectoryHandle("Rollback Source");
      for (const name of ["first.txt", "second.txt", "third.txt"]) {
        const file = await source.getFileHandle(name, { create: true });
        file.content = name;
      }
      window.AppState.setLoadedFolder(source);

      const originalCreateWritable = FakeFileHandle.prototype.createWritable;
      let writeCount = 0;
      FakeFileHandle.prototype.createWritable = async function() {
        const writable = await originalCreateWritable.call(this);
        const originalWrite = writable.write.bind(writable);
        writable.write = async chunk => {
          writeCount += 1;
          if (writeCount === 2) throw new DOMException("Injected write failure", "QuotaExceededError");
          return originalWrite(chunk);
        };
        return writable;
      };

      try {
        await window.FolderArchive.archiveLoadedFolder();
      } finally {
        FakeFileHandle.prototype.createWritable = originalCreateWritable;
      }

      const destination = await getDirectoryByPath(destinationRoot, "01_PROFILE/CVS");
      assert(
        !destination.directories.has("Rollback Source"),
        "The incomplete archived folder should be removed after a write failure."
      );
      assert(
        document.getElementById("folderArchiveResultBox").textContent ===
          "Folder archiving failed and was cancelled completely. The incomplete archived folder was removed, so no copied files or folders remain.",
        "The user should be told that the failed archive was fully cancelled and removed."
      );
      assert(
        destinationRoot.events.some(event => event.type === "remove-directory" && event.name === "Rollback Source"),
        "The rollback should recursively remove the archive target."
      );
    });

    test("Folder archiving does not start when safe rollback is unavailable", async () => {
      resetFolderArchiveMode();
      window.AppState.setTree(createTestTree());
      window.FolderTree.selectArchiveFolder("cvs");

      const destinationRoot = new FakeDirectoryHandle(window.FolderCreation.appRootFolderName);
      const destination = await window.FolderCreation.createDirectoryPath(destinationRoot, "01_PROFILE/CVS");
      destination.removeEntry = undefined;
      destinationRoot.events.length = 0;
      window.AppState.state.appRootHandle = destinationRoot;
      window.AppState.state.appRootTree = window.AppState.state.tree;

      const source = new FakeDirectoryHandle("Unsupported Rollback Source");
      const file = await source.getFileHandle("note.txt", { create: true });
      file.content = "not copied";
      window.AppState.setLoadedFolder(source);

      await window.FolderArchive.archiveLoadedFolder();

      assert(
        !destination.directories.has("Unsupported Rollback Source"),
        "No archive folder should be created when rollback is unavailable."
      );
      assert(
        document.getElementById("folderArchiveResultBox").textContent ===
          "This browser cannot safely remove an incomplete folder archive. The archive was not started. Please copy the folder manually using File Explorer.",
        "The user should receive a clear safe fallback message."
      );
      assert(
        !destinationRoot.events.some(event => event.type === "create-file"),
        "No file should be written when rollback support is unavailable."
      );
    });

    test("App-root selection cannot follow a later active mode", async () => {
      resetArchiveMode();

      const archiveState = window.AppState.getModeState("archive");
      const archiveRoot = new FakeDirectoryHandle(window.FolderCreation.appRootFolderName);
      window.FolderCreation.rememberRootHandle(archiveRoot);

      window.AppState.setActiveMode("archiveFolder");
      window.AppState.resetMode("archiveFolder");
      const folderArchiveState = window.AppState.getModeState("archiveFolder");
      const folderArchiveRoot = new FakeDirectoryHandle("Folder Archive Root");
      folderArchiveState.appRootHandle = folderArchiveRoot;
      folderArchiveState.appRootTree = folderArchiveState.tree;

      const permissionStarted = createDeferred();
      const permissionGate = createDeferred();
      archiveRoot.queryPermission = async options => {
        archiveRoot.events.push({ type: "query-permission", mode: options.mode, handle: archiveRoot.name });
        permissionStarted.resolve();
        await permissionGate.promise;
        return "granted";
      };

      window.AppState.setActiveMode("archive");
      const delayedRootRequest = window.FolderCreation.getOrChooseAppRootHandle();
      await permissionStarted.promise;
      window.AppState.setActiveMode("archiveFolder");
      permissionGate.resolve();

      let delayedError = null;
      try {
        await delayedRootRequest;
      } catch (error) {
        delayedError = error;
      }

      assert(delayedError?.code === "STALE_MODE_CONTEXT", "A destination request invalidated by a mode change should be cancelled.");
      assert(archiveState.appRootHandle === archiveRoot, "The initiating mode should retain only its original root handle.");
      assert(folderArchiveState.appRootHandle === folderArchiveRoot, "The newly active mode should retain only its own root handle.");

      resetArchiveMode();
      const pickerArchiveState = window.AppState.getModeState("archive");
      window.AppState.setActiveMode("archiveFolder");
      window.AppState.resetMode("archiveFolder");
      const pickerFolderState = window.AppState.getModeState("archiveFolder");
      const pickerGate = createDeferred();
      const pickerStarted = createDeferred();
      const selectedParent = new FakeDirectoryHandle("Delayed Parent");

      window.AppState.setActiveMode("archive");
      window.showDirectoryPicker = async () => {
        pickerStarted.resolve();
        await pickerGate.promise;
        return selectedParent;
      };

      const delayedPickerRequest = window.FolderCreation.getOrChooseAppRootHandle();
      await pickerStarted.promise;
      window.AppState.setActiveMode("archiveFolder");
      pickerGate.resolve();

      let pickerError = null;
      try {
        await delayedPickerRequest;
      } catch (error) {
        pickerError = error;
      }

      assert(pickerError?.code === "STALE_MODE_CONTEXT", "A picker result invalidated by a mode change should be cancelled.");
      assert(pickerArchiveState.appRootHandle === null, "A stale picker should not attach its handle to the initiating mode.");
      assert(pickerFolderState.appRootHandle === null, "A stale picker should not attach its handle to the newly active mode.");
      assert(!selectedParent.directories.has(window.FolderCreation.appRootFolderName), "A stale picker should not create an app root folder.");
    });

    test("A mode change during app-root creation reports possible partial output accurately", async () => {
      resetArchiveMode();
      window.FolderTree.selectArchiveFolder("cvs");
      window.AppState.setLoadedFile(new File(["stale archive"], "stale.txt", { type: "text/plain" }));

      window.AppState.setActiveMode("archiveFolder");
      window.AppState.resetMode("archiveFolder");
      const folderArchiveState = window.AppState.getModeState("archiveFolder");
      const createGate = createDeferred();
      const createStarted = createDeferred();
      const selectedParent = new FakeDirectoryHandle("Delayed Parent");
      const originalGetDirectoryHandle = selectedParent.getDirectoryHandle.bind(selectedParent);

      selectedParent.getDirectoryHandle = async (name, options = {}) => {
        const handle = await originalGetDirectoryHandle(name, options);
        createStarted.resolve();
        await createGate.promise;
        return handle;
      };

      window.AppState.setActiveMode("archive");
      window.showDirectoryPicker = async () => selectedParent;

      const delayedArchive = window.FileArchive.archiveLoadedFile();
      await createStarted.promise;
      window.AppState.setActiveMode("archiveFolder");
      createGate.resolve();
      await delayedArchive;

      const createdAppRoot = selectedParent.directories.get(window.FolderCreation.appRootFolderName);
      assert(createdAppRoot, "The test should reproduce creation of the app root before stale cancellation.");
      assert(
        document.getElementById("archiveResultBox").textContent === window.FolderCreation.staleAfterWriteMessage,
        "A stale cancellation after folder creation should disclose that partial output may exist."
      );
      assert(createdAppRoot.directories.size === 0, "No archive destination path should be created after stale cancellation.");
      assert(createdAppRoot.files.size === 0, "No archive file should be created after stale cancellation.");
      assert(folderArchiveState.appRootHandle === null, "The stale app root should not be attached to the newly active mode.");
    });

    test("New folder structure workflow still creates the normal app root", async () => {
      window.AppState.setActiveMode("buildTree");
      window.AppState.resetMode("buildTree");
      window.AppState.setActiveMode("buildTree");

      const events = [];
      const selectedParent = new FakeDirectoryHandle("Chosen Parent", {
        permissionState: "prompt",
        requestPermissionState: "granted",
        events
      });
      let pickerOptions = null;
      window.showDirectoryPicker = async options => {
        pickerOptions = options;
        return selectedParent;
      };

      const appRoot = await window.FolderCreation.getOrChooseAppRootHandle();
      await window.FolderCreation.createDirectoryPath(appRoot, "PROFILE");

      assert(pickerOptions?.mode === "readwrite", "The normal destination picker should request read/write access.");
      assert(selectedParent.directories.get(window.FolderCreation.appRootFolderName) === appRoot, "The normal workflow should still create the app root below the chosen parent.");
      assert(appRoot.directories.has("PROFILE"), "The normal workflow should still create tree folders inside the app root.");
    });

    async function runTests() {
      const results = document.getElementById("results");
      const summary = document.getElementById("summary");
      let passed = 0;

      for (const item of tests) {
        const result = document.createElement("article");
        result.className = "test-result";

        try {
          await item.callback();
          passed += 1;
          result.classList.add("pass");
          result.innerHTML = `<strong>PASS:</strong> ${item.name}`;
        } catch (error) {
          result.classList.add("fail");
          result.innerHTML = `<strong>FAIL:</strong> ${item.name}<br><code>${error.message}</code>`;
        }

        results.appendChild(result);
      }

      summary.textContent = `${passed} of ${tests.length} tests passed.`;
    }

    runTests();
  </script>
