<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Organize Your PC social preview</title>
  <desc id="desc">Social preview image for Organize Your PC, a local privacy-first folder tree advisor.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eff6ff"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#1e3a8a" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="80" y="80" width="1040" height="470" rx="36" fill="#ffffff" filter="url(#shadow)"/>
  <g transform="translate(130 135)">
    <rect x="0" y="0" width="250" height="170" rx="18" fill="#2563eb" opacity="0.12"/>
    <rect x="32" y="36" width="150" height="28" rx="8" fill="#2563eb"/>
    <rect x="32" y="82" width="190" height="18" rx="7" fill="#60a5fa"/>
    <rect x="32" y="118" width="120" height="18" rx="7" fill="#93c5fd"/>
    <path d="M86 250h220" stroke="#2563eb" stroke-width="12" stroke-linecap="round"/>
    <path d="M86 250v55" stroke="#2563eb" stroke-width="12" stroke-linecap="round"/>
    <path d="M196 250v55" stroke="#2563eb" stroke-width="12" stroke-linecap="round"/>
    <path d="M306 250v55" stroke="#2563eb" stroke-width="12" stroke-linecap="round"/>
    <rect x="32" y="305" width="110" height="48" rx="14" fill="#1d4ed8"/>
    <rect x="142" y="305" width="110" height="48" rx="14" fill="#2563eb"/>
    <rect x="252" y="305" width="110" height="48" rx="14" fill="#60a5fa"/>
  </g>
  <g transform="translate(520 165)">
    <text x="0" y="0" fill="#1e3a8a" font-family="Arial, Helvetica, sans-serif" font-size="62" font-weight="700">Organize Your PC</text>
    <text x="0" y="62" fill="#2563eb" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Personal Memory-Based File Advisor</text>
    <text x="0" y="132" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="28">Build a personal folder tree before moving files.</text>
    <text x="0" y="178" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="28">Local. Privacy-first. Advisory.</text>
    <rect x="0" y="232" width="410" height="58" rx="18" fill="#2563eb"/>
    <text x="28" y="270" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700">No upload • No auto-scan • No file moving</text>
  </g>
